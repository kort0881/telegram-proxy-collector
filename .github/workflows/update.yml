name: Update Verified Proxy Lists

on:
  schedule:
    - cron: '0 */2 * * *' # Каждые часа
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install --quiet requests pyyaml
      
    - name: Run Proxy Collector
      run: python main.py --top 100 --timeout 2.0 --workers 100
      
    - name: Copy files to root
      run: |
        cp verified/proxy_ru_verified.txt proxy_ru.txt
        cp verified/proxy_eu_verified.txt proxy_eu.txt
        cp verified/socks5_proxies.txt socks5.txt
        
        # Собираем общий файл (RU + EU), так как python-скрипт больше не делает .txt для всех
        cat verified/proxy_ru_verified.txt verified/proxy_eu_verified.txt > proxy_all.txt
        
    - name: Print Statistics
      run: |
        echo "=================================="
        echo "✅ MTProto RU: $(grep -c 'tg://' proxy_ru.txt 2>/dev/null || echo 0)"
        echo "✅ MTProto EU: $(grep -c 'tg://' proxy_eu.txt 2>/dev/null || echo 0)"
        echo "✅ SOCKS5: $(grep -c 'tg://' socks5.txt 2>/dev/null || echo 0)"
        echo "=================================="
        
    - name: Git Commit & Push
      run: |
        git config user.name "Proxy Bot"
        git config user.email "bot@github.com"
        git add verified/ proxy_ru.txt proxy_eu.txt proxy_all.txt socks5.txt || true
        # Коммитим только если есть реальные изменения
        git diff --staged --quiet || git commit -m "🔥 Update proxies $(date -u +'%Y-%m-%d %H:%M UTC')"
        git push || true
