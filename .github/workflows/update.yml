name: Update Verified Proxy Lists

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install --quiet requests pyyaml maxminddb geoip2

    - name: Download geoip.dat
      run: |
        mkdir -p data
        wget -q -O data/geoip.dat https://cdn.jsdelivr.net/gh/GrimbirdUsers/ru-routing-dat@main/geoip.dat

    - name: Run Proxy Collector
      run: python main.py --top 100 --timeout 2.0 --workers 100 --output-dir verified --geoip data/geoip.dat

    - name: Copy files to root
      run: |
        cp verified/proxy_ru_verified.txt proxy_ru.txt
        cp verified/proxy_eu_verified.txt proxy_eu.txt
        cp verified/proxy_us_verified.txt proxy_us.txt 2>/dev/null || echo "US file not found"
        cp verified/proxy_asia_verified.txt proxy_asia.txt 2>/dev/null || echo "ASIA file not found"
        cp verified/socks5_proxies.txt socks5.txt
        cat verified/proxy_ru_verified.txt verified/proxy_eu_verified.txt \
            verified/proxy_us_verified.txt verified/proxy_asia_verified.txt \
            2>/dev/null > proxy_all_mtproto.txt || true
        cat verified/proxy_ru_verified.txt verified/proxy_eu_verified.txt > proxy_all.txt

    - name: Print Statistics & Set Outputs
      id: stats
      run: |
        RU=$(grep -c '^tg://' proxy_ru.txt 2>/dev/null || echo 0)
        EU=$(grep -c '^tg://' proxy_eu.txt 2>/dev/null || echo 0)
        US=$(grep -c '^tg://' proxy_us.txt 2>/dev/null || echo 0)
        ASIA=$(grep -c '^tg://' proxy_asia.txt 2>/dev/null || echo 0)
        SOCKS=$(grep -c '^tg://' socks5.txt 2>/dev/null || echo 0)
        TOTAL=$((RU+EU+US+ASIA))
        echo "mtproto_count=$TOTAL" >> $GITHUB_OUTPUT
        echo "socks5_count=$SOCKS" >> $GITHUB_OUTPUT
        echo "=================================="
        echo "📊 MTProto по регионам:"
        echo "  🇷🇺 RU: $RU"
        echo "  🇪🇺 EU: $EU"
        echo "  🇺🇸 US: $US"
        echo "  🌏 ASIA: $ASIA"
        echo "  🌐 Всего MTProto: $TOTAL"
        echo "  🔌 SOCKS5: $SOCKS"
        echo "=================================="

    - name: Git Commit & Push
      id: commit
      run: |
        git config user.name "Proxy Bot"
        git config user.email "bot@github.com"
        
        # Принудительно добавляем все изменения
        git add -A
        git add -f verified/
        git add -f proxy_*.txt socks5.txt proxy_all_mtproto.txt proxy_all.txt
        
        if git diff --staged --quiet; then
          echo "Нет изменений для коммита"
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        git commit -m "🔥 Update proxies $(date -u +'%Y-%m-%d %H:%M UTC')"
        
        # Добавлен флаг --autostash, чтобы автоматически прятать и восстанавливать остаточные изменения
        git pull --rebase --autostash origin main
        git push origin main
        echo "changes_detected=true" >> $GITHUB_OUTPUT

    - name: Create Tag
      if: steps.commit.outputs.changes_detected == 'true'
      id: tag
      run: |
        TAG="v$(date -u +'%Y.%m.%d-%H%M%S')-${{ github.run_id }}"
        git tag -a "$TAG" -m "Auto-update proxies $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        git push origin "$TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: steps.commit.outputs.changes_detected == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "Proxy Update ${{ steps.tag.outputs.tag }}"
        body: |
          Автоматическое обновление списков прокси.
          - **Дата**: ${{ github.event.workflow_run.created_at || github.event.workflow_job.started_at }}
          - **MTProto**: ${{ steps.stats.outputs.mtproto_count }} прокси
          - **SOCKS5**: ${{ steps.stats.outputs.socks5_count }} прокси
        files: |
          proxy_all_mtproto.txt
          socks5.txt
          verified/proxy_all_verified.json
          verified/proxy_stats_verified.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
